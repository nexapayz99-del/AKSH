version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: aksh
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - BOT_TOKEN=${BOT_TOKEN}
      - OWNER_ID=${OWNER_ID}
    volumes:
      - ./sessions:/app/sessions
    env_file:
      - .env