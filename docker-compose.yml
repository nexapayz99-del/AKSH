version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: telegram_bot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - bot_network

  telegram-bot:
    build: .
    container_name: telegram_report_bot
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - BOT_TOKEN=${BOT_TOKEN}
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - OWNER_ID=${OWNER_ID}
    volumes:
      - ./sessions:/app/sessions
    env_file:
      - .env
    networks:
      - bot_network
    command: python -u main.py

volumes:
  mongo_data:

networks:
  bot_network:
    driver: bridge
