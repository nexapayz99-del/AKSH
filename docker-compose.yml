version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: telegram_bot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - bot_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  telegram-bot:
    build: .
    container_name: telegram_report_bot
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - BOT_TOKEN=${BOT_TOKEN}
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - OWNER_ID=${OWNER_ID}
    volumes:
      - ./sessions:/app/sessions
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - bot_network
    command: python -u main.py

volumes:
  mongo_data:

networks:
  bot_network:
    driver: bridge